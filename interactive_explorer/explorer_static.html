function nearestIdx(arr, val) {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < arr.length; i++) { const d = Math.abs(arr[i]-val); if (d < bestD) { bestD = d; best = i; } }
  return best;
}
function frac2val(arr, f) { return arr[0] + f * (arr[arr.length-1] - arr[0]); }

const dotTrace = { x: [0], y: [0], z: [0], mode: "markers", type: "scatter3d",
  marker: { size: 8, color: "red", line: {color:"white", width:1} }, showlegend:false };
const barTrace = { x: [], y: DATA.gene_names, type: "bar", orientation: "h", marker: {color:"#f0a05a"}, xaxis:"x2", yaxis:"y2", showlegend:false };

Plotly.newPlot(plotDiv, [bgTrace, dotTrace, barTrace], {

}, {displayModeBar:false});

function update() {
  const t  = frac2val(DATA.t_grid,  +document.getElementById("sT").value);
  const u1 = frac2val(DATA.u1_grid, +document.getElementById("sU1").value);
  const u2 = frac2val(DATA.u2_grid, +document.getElementById("sU2").value);
  const it = nearestIdx(DATA.t_grid, t), iu1 = nearestIdx(DATA.u1_grid, u1), iu2 = nearestIdx(DATA.u2_grid, u2);
  const expr = DATA.expr[it][iu1][iu2], conf = DATA.conf[it][iu1][iu2];

  Plotly.restyle(plotDiv, {x:[[t]], y:[[u1]], z:[[u2]]}, [1]);
  Plotly.restyle(plotDiv, {x:[expr]}, [2]);

  const flag = conf < DATA.typical_spacing*2 ? "near real data" : "far from real data (extrapolating)";
  document.getElementById("info").textContent =
    `t=${t.toFixed(2)}  UMAP1=${u1.toFixed(2)}  UMAP2=${u2.toFixed(2)}  |  confidence: ${conf.toFixed(3)} (${flag})`;
}
["sT","sU1","sU2"].forEach(id => document.getElementById(id).addEventListener("input", update));
update();
